<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STOREFRONT — Add Product</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────────────── -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">STORE<span>FRONT</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="add-product.html" class="active">Add Product</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ── Page Header ────────────────────────────────────────────── -->
  <header class="page-header">
    <div class="hero-content">
      <p class="hero-label">Inventory Management</p>
      <h1 class="hero-title">Add New Product</h1>
      <p class="hero-sub">Fill in the details below to list a product.</p>
    </div>
  </header>

  <!-- ── Form ───────────────────────────────────────────────────── -->
  <main class="container form-page">

    <div id="form-success" class="alert alert-success hidden">
      ✅ Product added successfully! <a href="index.html">View all products →</a>
    </div>
    <div id="form-error" class="alert alert-error hidden"></div>

    <div class="form-card">
      <div class="form-group">
        <label for="name">Product Name <span class="req">*</span></label>
        <input type="text" id="name" placeholder="e.g. Wireless Mouse" maxlength="100" />
        <span class="field-error" id="err-name"></span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="price">Price (₹) <span class="req">*</span></label>
          <input type="number" id="price" placeholder="e.g. 1499" min="0" step="0.01" />
          <span class="field-error" id="err-price"></span>
        </div>
        <div class="form-group">
          <label for="stock">Stock Quantity</label>
          <input type="number" id="stock" placeholder="e.g. 25" min="0" step="1" value="0" />
          <span class="field-error" id="err-stock"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="category">Category <span class="req">*</span></label>
        <select id="category">
          <option value="">— Select a category —</option>
          <option>Electronics</option>
          <option>Furniture</option>
          <option>Clothing</option>
          <option>Books</option>
          <option>Food</option>
          <option>Other</option>
        </select>
        <span class="field-error" id="err-category"></span>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" rows="4" maxlength="500" placeholder="Short description of the product (optional, max 500 chars)"></textarea>
        <span class="char-count" id="char-count">0 / 500</span>
        <span class="field-error" id="err-description"></span>
      </div>

      <div class="form-group">
        <label for="image_url">Product Image URL</label>
        <input type="text" id="image_url" placeholder="https://example.com/image.jpg" />
        <span class="field-hint">Paste any image link from the web (optional)</span>
        <span class="field-error" id="err-image_url"></span>
      </div>

      <button class="btn-submit" id="submit-btn" onclick="submitProduct()">
        <span id="btn-text">Add Product</span>
        <span id="btn-loader" class="btn-spinner hidden"></span>
      </button>
    </div>
  </main>

  <!-- ── Footer ─────────────────────────────────────────────────── -->
  <footer class="footer">
    <p>STOREFRONT &copy; 2025 &mdash; Full-Stack Project</p>
  </footer>

  <script src="add-product.js"></script>
</body>
</html>
